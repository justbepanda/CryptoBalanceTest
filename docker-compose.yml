services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: project-app
    restart: unless-stopped
    networks:
      - p-network
    volumes:
      - ./:/var/www
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: project-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    networks:
      - p-network
    volumes:
      - ./:/var/www
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    networks:
      - p-network
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-project}
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-project}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    networks:
      - p-network
    tmpfs:
      - /var/lib/postgresql/data

networks:
  p-network:
    driver: bridge

volumes:
  pgdata:
